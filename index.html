// ─── Animated Counter ─────────────────────────────────────────────────────────
function AnimCounter({ target, prefix='', duration=800 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    let start = null;
    const step = ts => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      setVal(Math.floor(progress * target));
      if (progress < 1) ref.current = requestAnimationFrame(step);
    };
    ref.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(ref.current);
  }, [target]);
  return <span>{prefix}{fmt(val)}</span>;
}

    <div className="toast" style={{

      background:'rgba(30,24,16,0.97)', border:'1px solid rgba(212,168,83,0.4)',

}

// ─── Ambient Particles ────────────────────────────────────────────────────────
function Particles() {
  const particles = useRef([...Array(12)].map((_,i) => ({
    left: `${5+Math.random()*90}%`,
    bottom: `${Math.random()*40}%`,
    delay: `${(i*0.8).toFixed(1)}s`,
    dur: `${10+Math.random()*5}s`,
    idx: i
  }))).current;
  return (
    <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:0}}>
      {particles.map(p => (
        <div key={p.idx} style={{
          position:'absolute', left:p.left, bottom:p.bottom,
          width:4, height:4, borderRadius:'50%',
          background:'rgba(212,168,83,0.3)',
          animationName:`float${p.idx}`, animationDuration:p.dur,
          animationDelay:p.delay, animationTimingFunction:'ease-in-out',
          animationIterationCount:'infinite'
        }} />
      ))}
    </div>
  );
}

// ─── Dashboard Tab ────────────────────────────────────────────────────────────
function Dashboard({ transactions }) {
  const income = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;
  const score = income === 0 ? 0 : Math.min(100, Math.max(0, Math.round((income - expense) / income * 100)));

  let glowColor = 'rgba(212,168,83,0.2)';
  if (balance > 0) glowColor = 'rgba(90,143,105,0.2)';
  if (balance < 0) glowColor = 'rgba(196,90,90,0.2)';

  let healthLabel = '', healthColor = '';
  if (score >= 80) { healthLabel = 'Your garden is blooming 🌸'; healthColor = '#7ab88a'; }
  else if (score >= 60) { healthLabel = 'The lantern still glows 🏮'; healthColor = '#d4a853'; }
  else if (score >= 40) { healthLabel = 'Mist on the path 🌫️'; healthColor = 'rgba(245,237,216,0.6)'; }
  else { healthLabel = "It's okay to rest 🌙"; healthColor = '#d4807e'; }

  const recent = [...transactions].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  const catEmoji = cat => {

  return (
    <div className="tab-content">

      <div style={{textAlign:'center',padding:'32px 0 24px',position:'relative'}}>
        <div style={{position:'relative',display:'inline-block'}}>
          <div style={{
            position:'absolute',width:200,height:200,borderRadius:'50%',
            background:`radial-gradient(circle, ${glowColor} 0%, transparent 70%)`,
            top:'50%',left:'50%',
            animation:'pulse 3s ease-in-out infinite',
            pointerEvents:'none'
          }}/>
          <div style={{position:'relative',zIndex:1}}>
            <span style={{fontSize:24,color:'#d4a853',verticalAlign:'super',fontFamily:'Georgia,serif'}}>৳</span>
            <span style={{fontSize:window.innerWidth<480?'40px':'48px',fontFamily:'Georgia,serif',color:'#f5edd8',fontWeight:'normal',letterSpacing:'-1px'}}>
              <AnimCounter target={Math.abs(balance)} />
            </span>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:10,marginTop:16}}>
          <span style={{background:'rgba(90,143,105,0.15)',border:'1px solid rgba(90,143,105,0.3)',color:'#7ab88a',padding:'6px 14px',borderRadius:20,fontSize:13}}>
            + ৳<AnimCounter target={income}/>
          </span>
          <span style={{background:'rgba(196,90,90,0.15)',border:'1px solid rgba(196,90,90,0.3)',color:'#d4807e',padding:'6px 14px',borderRadius:20,fontSize:13}}>
            - ৳<AnimCounter target={expense}/>
          </span>
        </div>
      </div>

      {/* Quick Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        {[
          {icon:'💰',val:balance,label:'Balance'},
          {icon:'📈',val:income, label:'Income'},
          {icon:'📉',val:expense,label:'Expenses'},
        ].map((s,i)=>(
          <GlassCard key={i} style={{padding:'16px 14px',textAlign:'center',animationDelay:`${i*60}ms`}}>
            <div style={{fontSize:22}}>{s.icon}</div>
            <div style={{fontSize:16,fontFamily:'monospace',color:'#f5edd8',marginTop:6,fontWeight:600}}>

  const cats = type==='income' ? INCOME_CATS : EXPENSE_CATS;

    width:'100%', padding:'14px 18px',

  const now = new Date();
  const thisM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastM = (() => { const d=new Date(now); d.setMonth(d.getMonth()-1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })();

  let filtered = transactions;
  if (search) filtered = filtered.filter(t=>t.description.toLowerCase().includes(search.toLowerCase())||t.category.toLowerCase().includes(search.toLowerCase()));
  if (filter==='Income') filtered = filtered.filter(t=>t.type==='income');
  else if (filter==='Expense') filtered = filtered.filter(t=>t.type==='expense');
  else if (filter==='This Month') filtered = filtered.filter(t=>t.date.startsWith(thisM));
  else if (filter==='Last Month') filtered = filtered.filter(t=>t.date.startsWith(lastM));
  filtered = [...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));

  const catEmoji = cat => {
    const all = [...EXPENSE_CATS,...INCOME_CATS];

          height:'100%',borderRadius:3,

        }}/>
      </div>

      <div style={{fontSize:12,fontStyle:'italic',color:'rgba(212,168,83,0.6)',textAlign:'center',marginTop:8}}>{quote}</div>

        <div style={{fontSize:11,color:'rgba(245,237,216,0.35)',textAlign:'center',marginTop:6}}>

    </GlassCard>
  );
}

    setName('');setTarget('');setSaved('');setDeadline('');
  }
  function submitFunds(e){
    e.preventDefault();
    if(!fundsAmt) return;
    onAddFunds(fundsId, parseFloat(fundsAmt));
    setFundsId(null);setFundsAmt('');
  }

  return (
    <div className="tab-content">
      {/* Add Goal */}
      <GlassCard style={{padding:20,marginBottom:24}}>
        <div style={{fontSize:16,color:'#f5edd8',marginBottom:16}}>Plant a new seed 🌱</div>
        <form onSubmit={submit}>
          <div style={{marginBottom:14}}>
            <label style={labelStyle}>Goal name</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. New laptop" style={inputStyle} onFocus={handleFocus} onBlur={handleBlur}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
            <div>
              <label style={labelStyle}>Target ৳</label>
              <input type="number" value={target} onChange={e=>setTarget(e.target.value)} placeholder="50000" style={inputStyle} onFocus={handleFocus} onBlur={handleBlur}/>
            </div>
            <div>
              <label style={labelStyle}>Saved ৳</label>
              <input type="number" value={saved} onChange={e=>setSaved(e.target.value)} placeholder="0" style={inputStyle} onFocus={handleFocus} onBlur={handleBlur}/>
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <label style={labelStyle}>Deadline (optional)</label>
            <input type="date" value={deadline} onChange={e=>setDeadline(e.target.value)} style={inputStyle} onFocus={handleFocus} onBlur={handleBlur}/>
          </div>
          <button type="submit" style={{
            width:'100%',height:48,
            background:'linear-gradient(135deg,#d4a853 0%,#b8894a 100%)',
            borderRadius:12,fontSize:14,fontWeight:600,color:'#1a1410',
            transition:'filter 200ms'
          }}
          onMouseEnter={e=>e.currentTarget.style.filter='brightness(1.1)'}
          onMouseLeave={e=>e.currentTarget.style.filter='none'}
          >Plant this seed 🌱</button>
        </form>
      </GlassCard>

      {/* Add Funds Modal */}
      {fundsId && (
        <GlassCard style={{padding:20,marginBottom:16,border:'1px solid rgba(212,168,83,0.3)'}}>
          <div style={{fontSize:14,color:'#f5edd8',marginBottom:12}}>Add funds to goal</div>
          <form onSubmit={submitFunds} style={{display:'flex',gap:8}}>
            <input type="number" value={fundsAmt} onChange={e=>setFundsAmt(e.target.value)}
              placeholder="Amount ৳" style={{...inputStyle,flex:1}}
              onFocus={handleFocus} onBlur={handleBlur}
            />
            <button type="submit" style={{
              padding:'0 20px',background:'linear-gradient(135deg,#d4a853,#b8894a)',
              borderRadius:10,fontSize:14,fontWeight:600,color:'#1a1410'
            }}>Add</button>
            <button type="button" onClick={()=>setFundsId(null)} style={{
              padding:'0 14px',background:'rgba(255,255,255,0.04)',
              border:'1px solid rgba(255,255,255,0.1)',
              borderRadius:10,fontSize:13,color:'rgba(245,237,216,0.5)'
            }}>✕</button>
          </form>
        </GlassCard>
      )}

      {goals.length===0 && (
        <div style={{textAlign:'center',marginTop:40}}>
          <div style={{fontSize:40}}>🌱</div>
          <div style={{fontSize:16,color:'rgba(245,237,216,0.4)',marginTop:12}}>No seeds planted yet</div>
          <div style={{fontSize:13,color:'rgba(245,237,216,0.3)',marginTop:6}}>Plant your first goal above ✦</div>
        </div>
      )}
      {goals.map(g=>(
        <GoalCard key={g.id} goal={g}
          onAddFunds={id=>{ setFundsId(id); setFundsAmt(''); }}
          onDelete={onDeleteGoal}
        />
      ))}
    </div>
  );
}

// ─── Reports Tab ──────────────────────────────────────────────────────────────
function Reports({ transactions }) {
  const now = new Date();
  const monthLabel = now.toLocaleString('en-US',{month:'long',year:'numeric'});
  const thisM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const thisMonthTx = transactions.filter(t=>t.date.startsWith(thisM));
  const monthIncome = thisMonthTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const monthExpense = thisMonthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const monthBalance = monthIncome - monthExpense;
  const savingsRate = monthIncome > 0 ? Math.round((monthBalance/monthIncome)*100) : 0;

  // Category breakdown
  const catTotals = {};
  thisMonthTx.filter(t=>t.type==='expense').forEach(t=>{
    catTotals[t.category] = (catTotals[t.category]||0) + t.amount;
  });
  const catEntries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const maxCat = catEntries.length > 0 ? catEntries[0][1] : 1;
  const catEmoji = cat => {
    const all=[...EXPENSE_CATS,...INCOME_CATS];
    const f=all.find(c=>c.label===cat);
    return f?f.emoji:'💳';
  };

  // 6-month trend
  const months = [...Array(6)].map((_,i)=>{
    const d = new Date(now); d.setMonth(d.getMonth()-i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const exp = transactions.filter(t=>t.date.startsWith(key)&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
    return { label:d.toLocaleString('en-US',{month:'short'}), exp };
  }).reverse();
  const maxExp = Math.max(...months.map(m=>m.exp), 1);

  // Bar widths with animation
  const [barAnims, setBarAnims] = useState({});
  useEffect(() => {
    const t = setTimeout(() => {
      const anim = {};
      catEntries.forEach(([cat]) => { anim[cat] = true; });
      setBarAnims(anim);
    }, 100);
    return () => clearTimeout(t);
  }, [thisM]);

  // AI Insight
  const foodPct = monthExpense > 0 ? ((catTotals['Food']||0)/monthExpense)*100 : 0;
  let insight = 'Every number here is a moment lived. The ledger of your days tells a story only you can read. ✦';
  if (foodPct > 30) insight = 'You\'ve been nourishing yourself generously — perhaps the soul needed feeding too. 🍵';
  else if (savingsRate > 20) insight = 'The lantern glows warmly. You are building something beautiful, one coin at a time. 🏮';
  else if (savingsRate < 0) insight = 'The river ran fast this month. But rivers always find their way home. Be gentle with yourself. 🌊';

  return (
    <div className="tab-content">
      {/* Monthly Summary */}
      <GlassCard style={{padding:24,marginBottom:16}}>
        <div style={{fontFamily:'Georgia,serif',fontSize:20,color:'#f5edd8',marginBottom:16}}>{monthLabel}</div>
        {[
          {label:'Total Income',  val:`৳${fmt(monthIncome)}`,  color:'#7ab88a'},
          {label:'Total Expenses',val:`৳${fmt(monthExpense)}`, color:'#d4807e'},
          {label:'Net Balance',   val:`৳${fmt(Math.abs(monthBalance))}`, color:monthBalance>=0?'#7ab88a':'#d4807e'},
          {label:'Savings Rate',  val:`${savingsRate}%`, color:savingsRate>=0?'#d4a853':'#d4807e'},
        ].map((r,i)=>(
          <div key={i} style={{
            display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'10px 0',borderBottom:i<3?'1px solid rgba(255,255,255,0.05)':'none'
          }}>
            <span style={{fontSize:13,color:'rgba(245,237,216,0.5)'}}>{r.label}</span>
            <span style={{fontSize:15,fontFamily:'monospace',fontWeight:600,color:r.color}}>{r.val}</span>
          </div>
        ))}
      </GlassCard>

      {/* Category Breakdown */}
      {catEntries.length > 0 && (
        <GlassCard style={{padding:20,marginBottom:16}}>
          <div style={{fontSize:13,color:'rgba(245,237,216,0.4)',letterSpacing:'1px',textTransform:'uppercase',marginBottom:16}}>Where it went</div>
          {catEntries.map(([cat,amt])=>{
            const pct = maxExp>0 ? (amt/maxExp*100) : 0;
            const totalPct = monthExpense>0 ? Math.round(amt/monthExpense*100) : 0;
            const color = CAT_COLORS[cat]||'#8a9ab8';
            return (
              <div key={cat} style={{display:'flex',alignItems:'center',marginBottom:12}}>
                <span style={{minWidth:100,fontSize:13,color:'rgba(245,237,216,0.7)'}}>{catEmoji(cat)} {cat}</span>
                <div style={{flex:1,height:8,background:'rgba(255,255,255,0.06)',borderRadius:4,margin:'0 12px',overflow:'hidden'}}>
                  <div style={{
                    height:'100%',borderRadius:4,background:color,
                    width: barAnims[cat] ? `${pct}%` : '0%',
                    transition:'width 800ms ease-out'
                  }}/>
                </div>
                <span style={{fontSize:12,color:'rgba(245,237,216,0.5)',whiteSpace:'nowrap'}}>৳{fmt(amt)} ({totalPct}%)</span>
              </div>
            );
          })}
        </GlassCard>
      )}

      {/* 6 Month Trend */}
      <GlassCard style={{padding:20,marginBottom:16}}>
        <div style={{fontSize:13,color:'rgba(245,237,216,0.4)',letterSpacing:'1px',textTransform:'uppercase',marginBottom:16}}>6-month story</div>
        <div style={{display:'flex',alignItems:'flex-end',gap:8,height:110}}>
          {months.map((m,i)=>{
            const h = maxExp > 0 ? Math.max(4, Math.round((m.exp/maxExp)*80)) : 4;
            return (
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center'}}>
                <div style={{
                  width:'100%',background:'rgba(212,168,83,0.2)',
                  borderRadius:'4px 4px 0 0',borderTop:'2px solid #d4a853',
                  height:`${h}px`,transition:'height 600ms ease-out'
                }}/>
                <span style={{fontSize:10,color:'rgba(245,237,216,0.35)',marginTop:6}}>{m.label}</span>
              </div>
            );
          })}
        </div>
      </GlassCard>

      {/* AI Insight */}
      <div style={{
        background:'rgba(212,168,83,0.04)',
        border:'1px solid rgba(212,168,83,0.15)',
        borderRadius:16,padding:24,marginBottom:16
      }}>
        <div style={{fontSize:11,color:'#d4a853',letterSpacing:'2px',textTransform:'uppercase'}}>✦ Insight</div>
        <div style={{height:1,background:'rgba(212,168,83,0.1)',margin:'12px 0'}}/>
        <p style={{fontSize:14,color:'rgba(245,237,216,0.8)',lineHeight:1.7,fontStyle:'italic'}}>{insight}</p>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function MainApp({ onLogout }) {
  const [tab, setTab] = useState('home');
  const [transactions, setTransactions] = useState(() => loadTx() || SEED_TX);
  const [goals, setGoals] = useState(() => loadGoals());
  const [toast, setToast] = useState(null);

  useEffect(() => { saveTx(transactions); }, [transactions]);
  useEffect(() => { saveGoals(goals); }, [goals]);

  function showToast(msg) { setToast(msg); }

  function addTransaction(entry) {
    setTransactions(prev => [entry, ...prev]);
    showToast('✦ Entry inked into your story');
    setTab('home');
  }
  function deleteTransaction(id) {
    setTransactions(prev => prev.filter(t=>t.id!==id));
    showToast('Entry removed from the ledger');
  }
  function addGoal(goal) {
    setGoals(prev => [...prev, goal]);
    showToast('🌱 New seed planted!');
  }
  function addFundsToGoal(id, amt) {
    setGoals(prev => prev.map(g => g.id===id ? {...g, saved: Math.min(g.saved+amt, g.target)} : g));
    showToast('✦ Funds added to your goal');
  }

  const contentStyle = {
    paddingTop:76, paddingBottom:80,
    overflowY:'auto', height:'100vh',
    paddingLeft:16, paddingRight:16
  };

  const tabMap = {
    home:    <Dashboard transactions={transactions}/>,
    add:     <AddEntry onAdd={addTransaction}/>,
    journal: <Journal transactions={transactions} onDelete={deleteTransaction}/>,
    goals:   <Goals goals={goals} onAddGoal={addGoal} onAddFunds={addFundsToGoal} onDeleteGoal={id=>setGoals(p=>p.filter(g=>g.id!==id))}/>,
    reports: <Reports transactions={transactions}/>,
  };

  return (
    <div style={{height:'100vh',overflow:'hidden',background:'#0d1117',position:'relative'}}>
      <div style={{
        position:'fixed',inset:0,zIndex:0,pointerEvents:'none',
        background:'radial-gradient(ellipse 800px 600px at 50% 30%, rgba(212,168,83,0.04) 0%, transparent 70%)'
      }}/>
      <Particles/>
      <Header onLogout={onLogout}/>
      <div style={contentStyle}>
        <div style={{maxWidth:600,margin:'0 auto'}}>
          {tabMap[tab]}
        </div>
      </div>
      <BottomNav active={tab} onChange={setTab}/>
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────
function App() {
  const [loggedIn, setLoggedIn] = useState(() => {
    const s = loadSession();
    return s && s.loggedIn;
  });

  function handleLogin(user) {
    saveSession({ user, loggedIn: true });
    setLoggedIn(true);
  }
  function handleLogout() {
    saveSession(null);
    setLoggedIn(false);
  }

  return loggedIn
    ? <MainApp onLogout={handleLogout}/>
    : <LoginScreen onLogin={handleLogin}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
